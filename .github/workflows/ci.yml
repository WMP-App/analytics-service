name: CI - Analytics Service
on: [push]
jobs:
  docker-build:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v6
      - name: Build Image
        run: make docker-build

  eks_deploy:
    runs-on: self-hosted
    steps:
      - name: actions/checkout@v6
        with:
          repository: WMP-App/wmp-helm-v1
      - name: Helm Deploy
        run: make eks-deploy